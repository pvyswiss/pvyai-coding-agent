name: PVYAI
description: >-
  Run the PVYai coding agent headlessly in a GitHub workflow. PVYai is
  model- and provider-agnostic: you supply the provider and API key as inputs.
author: pvyswiss

branding:
  icon: terminal
  color: green

inputs:
  prompt:
    description: The instruction for PVYai to execute. Mutually exclusive with prompt-file.
    required: false
    default: ""
  prompt-file:
    description: Path (relative to working-directory) to a file whose contents are the prompt.
    required: false
    default: ""
  provider:
    description: >-
      Provider id to activate (for example openai, anthropic, gemini, ollama, or
      any configured OpenAI-/Anthropic-compatible endpoint). Optional when the
      repository already carries a .pvyai/config.json with an active provider.
    required: false
    default: ""
  api-key:
    description: >-
      The provider API key. Pass it from a repository or organization secret;
      it is exported only for the PVYai step and never written to the log.
    required: false
    default: ""
  api-key-env:
    description: >-
      Name of the environment variable the chosen provider reads its key from
      (for example OPENAI_API_KEY or ANTHROPIC_API_KEY). When set together with
      api-key, that variable is exported only for the PVYai step. Leave the action
      provider-agnostic by passing the env name your provider expects rather
      than hardcoding one here.
    required: false
    default: ""
  model:
    description: Model id to use for the run. Defaults to the resolved provider's default.
    required: false
    default: ""
  mode:
    description: Run mode passed to `pvyai exec --mode` (for example smart, deep, or fast).
    required: false
    default: ""
  auto:
    description: >-
      Autonomy ceiling passed to `pvyai exec --auto` (low, medium, or high).
      Defaults to the conservative `low` so an unattended CI run cannot take
      high-impact actions implicitly.
    required: false
    default: low
  self-correct:
    description: >-
      When true, allow PVYai to request a stronger model mid-run if it hits a
      wall (maps to `pvyai exec --allow-escalation`).
    required: false
    default: "false"
  add-dir:
    description: >-
      Newline- or comma-separated extra write roots granted to the run (each
      passed as `pvyai exec --add-dir`). The checked-out repository is always
      writable; everything else stays read-only unless listed here.
    required: false
    default: ""
  worktree:
    description: When true, run inside an isolated git worktree (`pvyai exec --worktree`).
    required: false
    default: "false"
  output-format:
    description: >-
      Output format for `pvyai exec` (text, json, or stream-json). Defaults to
      stream-json, which is captured to a file and exposed as the output-file
      output and uploaded by the caller if desired.
    required: false
    default: stream-json
  post-to:
    description: >-
      Optional destination for a run summary after PVYai finishes: `pr-comment`
      posts to the triggering pull request using github-token, `slack` posts to
      slack-webhook-url, or `none` (default) posts nowhere.
    required: false
    default: none
  slack-webhook-url:
    description: >-
      Slack incoming-webhook (or generic webhook) URL used when post-to is
      slack. Pass it from a secret; it is never written to the log.
    required: false
    default: ""
  github-token:
    description: >-
      Token used to post a PR comment when post-to is pr-comment. Defaults to
      the workflow's GITHUB_TOKEN; the workflow must grant pull-requests: write.
    required: false
    default: ${{ github.token }}
  working-directory:
    description: Directory to run PVYai in. Defaults to the workspace root.
    required: false
    default: ${{ github.workspace }}
  pvyai-version:
    description: >-
      PVYai release version/tag to install (for example v1.2.3 or latest).
      Defaults to the ref this action was resolved at, falling back to latest.
    required: false
    default: ""
  pvyai-repo:
    description: Repository to install the PVYai release from (owner/repo).
    required: false
    default: pvyswiss/pvyai-coding-agent

outputs:
  exit-code:
    description: The exit code PVYai returned (0 success, 2 usage, 3 provider, non-zero otherwise).
    value: ${{ steps.run.outputs.exit-code }}
  output-file:
    description: Path to the captured PVYai stdout (the raw output-format stream).
    value: ${{ steps.run.outputs.output-file }}
  summary:
    description: A short human-readable summary line parsed from the run, when available.
    value: ${{ steps.run.outputs.summary }}

runs:
  using: composite
  steps:
    - name: Install PVYai
      shell: bash
      env:
        PVYAI_REPO: ${{ inputs.pvyai-repo }}
        PVYAI_VERSION_INPUT: ${{ inputs.pvyai-version }}
        ACTION_REF: ${{ github.action_ref }}
        ACTION_PATH: ${{ github.action_path }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail
        if [ "${RUNNER_OS}" = "Windows" ]; then
          echo "::error<IP_ADDRESS>The PVYai action currently supports Linux and macOS runners only." >&2
          exit 1
        fi
        # Resolve the version to install: explicit input wins; otherwise the ref
        # this action was checked out at (a tag); otherwise the latest release.
        version="${PVYAI_VERSION_INPUT}"
        if [ -z "${version}" ]; then
          version="${ACTION_REF}"
        fi
        # A commit-SHA pin (github.action_ref is the 40-hex SHA) is not a release
        # tag, so fall back to latest rather than fetching releases/download/v<sha>.
        case "${version}" in
          ""|refs/*|*/*) version="latest" ;;
        esac
        if printf '%s' "${version}" | grep -qiE '^[0-9a-f]{40}$'; then
          version="latest"
        fi
        install_dir="${RUNNER_TEMP}/pvyai-bin"
        mkdir -p "${install_dir}"
        # Reuse PVYai's own checksum-verifying installer, shipped with the action.
        PVYAI_REPO="${PVYAI_REPO}" PVYAI_VERSION="${version}" PVYAI_INSTALL_DIR="${install_dir}" \
          bash "${ACTION_PATH}/scripts/install.sh"
        echo "${install_dir}" >> "${GITHUB_PATH}"

    - name: Run PVYai
      id: run
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        # Secrets are passed via the environment and never echoed. `set +x` and
        # the absence of any `echo` of these values keep them out of the log.
        PVYAI_INPUT_API_KEY: ${{ inputs.api-key }}
        PVYAI_INPUT_API_KEY_ENV: ${{ inputs.api-key-env }}
        PVYAI_INPUT_PROVIDER: ${{ inputs.provider }}
        PVYAI_INPUT_PROMPT: ${{ inputs.prompt }}
        PVYAI_INPUT_PROMPT_FILE: ${{ inputs.prompt-file }}
        PVYAI_INPUT_MODEL: ${{ inputs.model }}
        PVYAI_INPUT_MODE: ${{ inputs.mode }}
        PVYAI_INPUT_AUTO: ${{ inputs.auto }}
        PVYAI_INPUT_SELF_CORRECT: ${{ inputs.self-correct }}
        PVYAI_INPUT_ADD_DIR: ${{ inputs.add-dir }}
        PVYAI_INPUT_WORKTREE: ${{ inputs.worktree }}
        PVYAI_INPUT_OUTPUT_FORMAT: ${{ inputs.output-format }}
        RUNNER_TEMP: ${{ runner.temp }}
      run: |
        set -euo pipefail

        # Export the provider key under the env name the provider expects. This
        # keeps the action provider-agnostic: no provider->env mapping is baked
        # in. The value is never printed.
        if [ -n "${PVYAI_INPUT_API_KEY}" ] && [ -n "${PVYAI_INPUT_API_KEY_ENV}" ]; then
          if ! printf '%s' "${PVYAI_INPUT_API_KEY_ENV}" | grep -qE '^[A-Za-z_][A-Za-z0-9_]*$'; then
            echo "::error<IP_ADDRESS>api-key-env must be a valid environment variable name." >&2
            exit 2
          fi
          # Export in-process for this Run PVYai step so pvyai can read it; do
          # not persist provider credentials to later job steps.
          export "${PVYAI_INPUT_API_KEY_ENV}=${PVYAI_INPUT_API_KEY}"
        fi
        if [ -n "${PVYAI_INPUT_PROVIDER}" ]; then
          export PVYAI_PROVIDER="${PVYAI_INPUT_PROVIDER}"
        fi

        args=(exec)

        if [ -n "${PVYAI_INPUT_PROMPT_FILE}" ] && [ -n "${PVYAI_INPUT_PROMPT}" ]; then
          echo "::error<IP_ADDRESS>The 'prompt' and 'prompt-file' inputs are mutually exclusive." >&2
          exit 2
        fi
        if [ -n "${PVYAI_INPUT_PROMPT_FILE}" ]; then
          args+=(--file "${PVYAI_INPUT_PROMPT_FILE}")
        elif [ -n "${PVYAI_INPUT_PROMPT}" ]; then
          args+=(--prompt "${PVYAI_INPUT_PROMPT}")
        else
          echo "::error<IP_ADDRESS>Provide either the 'prompt' or 'prompt-file' input." >&2
          exit 2
        fi

        [ -n "${PVYAI_INPUT_MODEL}" ] && args+=(--model "${PVYAI_INPUT_MODEL}")
        [ -n "${PVYAI_INPUT_MODE}" ] && args+=(--mode "${PVYAI_INPUT_MODE}")
        [ -n "${PVYAI_INPUT_AUTO}" ] && args+=(--auto "${PVYAI_INPUT_AUTO}")
        [ "${PVYAI_INPUT_SELF_CORRECT}" = "true" ] && args+=(--allow-escalation)
        [ "${PVYAI_INPUT_WORKTREE}" = "true" ] && args+=(--worktree)
        args+=(--output-format "${PVYAI_INPUT_OUTPUT_FORMAT}")
        # No --notify in CI (no terminal); the optional Slack post is handled
        # separately below so it works regardless of output format.
        args+=(--no-notify)

        # Split add-dir on newlines and commas; each non-empty entry is a root.
        if [ -n "${PVYAI_INPUT_ADD_DIR}" ]; then
          while IFS= read -r dir; do
            # Trim only surrounding whitespace so paths with internal spaces survive.
            dir="$(printf '%s' "${dir}" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
            [ -n "${dir}" ] && args+=(--add-dir "${dir}")
          done < <(printf '%s' "${PVYAI_INPUT_ADD_DIR}" | tr ',' '\n')
        fi

        output_file="${RUNNER_TEMP}/pvyai-output.txt"

        # Run PVYai. Capture stdout to a file AND echo it to the log. Surface the
        # real exit code as the step's status. The sandbox is active by default;
        # this action never enables unsafe permission-skipping.
        set +e
        pvyai "${args[@]}" | tee "${output_file}"
        code=${PIPESTATUS[0]}
        set -e

        echo "exit-code=${code}" >> "${GITHUB_OUTPUT}"
        echo "output-file=${output_file}" >> "${GITHUB_OUTPUT}"

        # Best-effort one-line summary: last non-empty line of the captured output.
        summary="$(grep -v '^[[:space:]]*$' "${output_file}" | tail -n 1 || true)"
        # Keep the summary single-line and bounded for the step output.
        summary="$(printf '%s' "${summary}" | cut -c1-280)"
        {
          echo "summary<<PVYAI_EOF"
          printf '%s\n' "${summary}"
          echo "PVYAI_EOF"
        } >> "${GITHUB_OUTPUT}"

        exit "${code}"

    - name: Post run summary to pull request
      if: ${{ always() && inputs.post-to == 'pr-comment' && github.event.pull_request.number != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PVYAI_EXIT: ${{ steps.run.outputs.exit-code }}
        PVYAI_SUMMARY: ${{ steps.run.outputs.summary }}
      run: |
        set -euo pipefail
        status="succeeded"
        [ "${PVYAI_EXIT}" != "0" ] && status="failed (exit ${PVYAI_EXIT})"
        body="$(printf 'PVYai run %s.\n\n%s' "${status}" "${PVYAI_SUMMARY}")"
        gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
          -f body="${body}" >/dev/null

    - name: Post run summary to Slack
      if: ${{ always() && inputs.post-to == 'slack' && inputs.slack-webhook-url != '' }}
      shell: bash
      env:
        SLACK_WEBHOOK_URL: ${{ inputs.slack-webhook-url }}
        PVYAI_EXIT: ${{ steps.run.outputs.exit-code }}
        PVYAI_SUMMARY: ${{ steps.run.outputs.summary }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      run: |
        set -euo pipefail
        status="succeeded"
        [ "${PVYAI_EXIT}" != "0" ] && status="failed (exit ${PVYAI_EXIT})"
        text="PVYai run ${status} for ${GITHUB_REPOSITORY}@${GITHUB_REF_NAME}. ${PVYAI_SUMMARY} ${RUN_URL}"
        # Slack incoming webhooks accept {"text": "..."}; jq escapes the body and
        # the URL is never echoed. A delivery failure is a warning, not a failure.
        payload="$(jq -n --arg text "${text}" '{text: $text}')"
        curl --fail --silent --show-error -X POST -H 'Content-Type: application/json' \
          -d "${payload}" "${SLACK_WEBHOOK_URL}" >/dev/null || \
          echo "::warning::Slack webhook delivery failed (run not affected)."
